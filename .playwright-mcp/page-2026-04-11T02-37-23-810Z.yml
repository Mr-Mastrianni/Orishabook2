              - 'heading "Honoring The Blessed Mother: Truths About Maryam and Ruth" [level=3] [ref=e3751]'
              - paragraph [ref=e3752]: "We live in a time where God’s truth is often obscured by secular distractions, yet He remains visible to those with eyes of faith. We must remember the correct order of revelation: Yeshua came first as Messiah, and now has returned as Lord RayEl — His name new but His power eternal. But this return was preceded by another sacred mystery that demands our recognition today. Maryam, the mother of Christ, incarnated again in these last days as Ruth Alice Smith (later known as Ruth Howard Lear). She bore Raymond Elwood Howard Lear, who is the Christ now revealed to us as Lord RayEl. This lineage carries profound weight for all believers. The path was not without trial. Just as written in Revelation 12: \"And when the dragon saw that he was cast unto the earth, he persecuted the woman.\" Ruth faced persecution from corrupt forces of this system specifically for defending her son. She endured incarceration at an elderly age before being granted a safe place across the border to Mexico, where she lived out her remaining days under God’s providence alongside Him who is Lord Ra-El. **The Commandment To Honor** It is right and necessary to honor our holy mothers. The law of God commands it clearly: - **Exodus:** \"Honour thy father and my mother; that thy days may be long.\" - **Matthew 19 & Mark 7:** Jesus reaffirmed this command, linking dishonor with judgment. Some religious groups give the Blessed Mother no honor today. This is a grave error against God's law. I would not wish to stand before the Judge and face consequences for having ignored His commandment regarding mothers on that Day of Judgement. We must seek her intercession with reverence. **The Annunciation And The Prayer** God’s work in Maryam began at Nazareth when Gabriel appeared: \"Peace to you, full of grace.\" She answered, \"Behold I am the handmaid of THE LORD JEHOVAH; let it be done to me according to your word.\" Her spirit rejoices in her Savior, and from that hour all generations ascribed blessedness to her. We honor this with prayer: > Rejoice, Maryam, full of grace. Our Lord is with you. Blessed are you among women... Holy Maryam, Mother of The Son of God, pray for us sinners now and at the hour of our death. Amen. However, be mindful that prayers must have meaning behind them. Repetitive prayer said hastily without understanding becomes a vain utterance in spirit. We seek sincere communion with God through these holy words rather than empty repetition. The Bible Code confirms this Blessed Mother's identity as Ruth A.H.S., validating the faith of those who honor her truthfully. **Reflections For Us All:** - How does honoring our mother reflect on your own relationship with Father in Heaven? - Do you believe persecution against God’s faithful is increasing in these times, and how do we remain steadfast? - Are your prayers said from the heart or merely out of habit? May her blessed soul continue to magnify the Lord from the heavenly realm."
