                    - heading "The Biblical Truth of Reincarnation and the Meaning of Born Again" [level=3] [ref=e1107]
                    - paragraph [ref=e1108]: "## The Mystery of Christ's Return and Soul Maturity Many wonder why the Messiah did not return with a body containing 2000-year-old scars that might be worn out or decayed. Perhaps there is a deeper reason for this renewal. In Genesis 6:3 we are told that Yahweh set limits because man is flesh and spirit struggles together within time, suggesting life cycles are part of God's process where the soul must grow through experience. ## Reincarnation Is Scriptural We often hear teachings label reincarnation as New Age yet this concept appears woven into Scripture itself. Consider Matthew 11:13-15 regarding John the Baptist and Elijah. Jesus indicated that if you are willing to accept it, John is Elijah who was to come. How could this be fulfilled without a new body? If Elijah returned with an old decapitated head or spirit alone, how does one say he \"came\"? The reality points to rebirth—a soul returning in a fresh form so the lesson can continue until maturity is reached. ## A New Portal Opened by Christ RayEl During the Middle Ages some teachings were obscured perhaps for financial reasons regarding indulgences—payments said to reduce punishment for sins. However truth was never truly lost according to revelation: Before I came as Lord RayEl two millennia ago, souls were trapped here upon death due to deception by Satan. What the Messiah accomplished with His sacrifice and return opened a portal to a planet where waiting souls could reside in a comfortable frequency until Father returns. The light you see at the end of that tunnel is actually our destination before judgment day. ## Understanding Born Again In John 3:3 Yeshua told Nicodemus that unless one be born again they cannot see God's kingdom. Nicodemus questioned how an old man could enter a womb twice yet look at the incident in Matthew or the blind man of John 9 where disciples asked if sins caused blindness—sins from previous lives? Job spoke confidently that he came naked out and would return to mother earth (Job 1:21). When Romans speaks of dying to sin it is about spiritual cleansing. However Hebrews which says we die once after judgment must be read in context with the whole plan where records are kept for restoration. The apostles understood souls cycle until they mature fully so they can see the kingdom truly. Christians often use this scripture to dismiss above truths but proper context states that by accepting Christ we have died to sin and been born again to a new life. ## A Call to Reflection - Does it make sense to you why Christ returned as a man without aged scars? - Do you believe your past experiences might be preparing you for this final maturity? - Are we allowing history's censorship or fear to keep us from spiritual truths about reincarnation and soul growth? You must be born again! Not just in spirit but with eyes open to the fullness of God's plan."
