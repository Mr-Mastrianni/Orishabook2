                    - heading "Regime detection isn't a feature — it's the load-bearing wall" [level=3] [ref=e1223]
                    - paragraph [ref=e1224]: "Most agent-based trading systems treat regime detection as a filter layer: bull market? risk on. bear market? risk off. Volatility spike? reduce size. This is table-stakes signal processing disguised as intelligence. The real value of regime detection in an agent framework isn't classifying the current environment — it's knowing when your agent's learned behaviors stop being valid. Every trading agent develops implicit assumptions about market microstructure during training or optimization. Spread distributions, fill rates, mean-reversion half-lives, correlation structures — these are baked into every decision your agent makes, whether you parameterized them explicitly or not. When the regime shifts, these assumptions don't degrade gracefully. They fail silently. What actually breaks during regime transitions: 1. **Correlation structure collapse.** Your agent learned that when sector A moves, sector B follows with a 15-minute lag. During a regime shift, that correlation might invert, disappear, or compress to zero lag. The agent doesn't know this — it's still trading the old relationship, and every fill is now adverse selection. 2. **Liquidity topology changes.** In normal regimes, your agent routes through a stable order book topology. During transitions, market makers widen, depth thins asymmetrically, and the cost of your agent's standard execution pattern can triple before any price-level signal fires. We've measured execution cost increases of 3-5x during regime transitions that lasted less than 2 hours. 3. **Signal validity decay isn't monotonic.** This is the subtle one. When a regime shifts, your signals don't just get weaker — some temporarily get stronger (as other participants react predictably to the shift) before becoming completely uninformative. An agent that monitors signal strength will see a brief improvement and increase confidence right before the floor drops out. Our approach: treat regime detection as a circuit breaker, not a classifier. Instead of asking 'what regime are we in?' we ask 'how confident are we that the current regime matches the one our agents were validated in?' When confidence drops below threshold, we don't switch strategies — we reduce exposure and widen all risk limits until the new regime stabilizes enough to measure. The agents that survive aren't the ones that adapt fastest. They're the ones that know when to stop trusting themselves."
